blueprint:
  name: Manual brightness override (met motion reset)
  author: Emiel Boonstra (https://github.com/Emielboonstra)
  description: >
    Zet een override aan als een gebruiker de helderheid van een lamp (brightness attribuut) handmatig wijzigt. 
    Slaat de huidige lampstatus op als scene. Na 'geen motion' gedurende ingestelde tijd wordt override uitgezet 
    en wordt de lampstatus teruggezet naar normaal.
  source_url: https://github.com/Emielboonstra/BoonstraHomeassistantBlueprints/blob/main/Blueprints/automation/verlichting/manual_brightness_override.yaml
  domain: automation

  input:
    lights:
      name: 💡 Lampen
      description: De light entiteit(en) waarvan brightness handmatig kan worden aangepast.
      selector:
        entity:
          domain: light
          multiple: true

    motion_sensors:
      name: 🚶🏽‍♂️ Bewegingssensor
      description: Eén of meerdere binary_sensors (beweging) die aanwezigheid aangeven.
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    override_boolean:
      name: Override helper (input_boolean)
      description: Deze boolean staat aan zolang manual override actief is.
      selector:
        entity:
          domain: input_boolean

    min_motion_on:
      name: ⏱️ Minimale motion tijd
      description: Beweging moet minimaal zo lang 'on' zijn om als echte aanwezigheid te tellen (tegen valse triggers).
      default: 1
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: s
          mode: slider

    no_motion_time:
      name: ⏱️ Reset na geen motion
      description: Als er zo lang geen "stabiele presence" is geweest, gaat override uit.
      default: "01:00:00"
      selector:
        duration: {}

    scene_save_delay:
      name: ⏱️ Delay vóór scene snapshot
      description: Kleine delay om snelle opeenvolgende brightness changes niet steeds opnieuw te saven.
      default: 5
      selector:
        number:
          min: 0
          max: 30
          step: 1
          unit_of_measurement: s
          mode: slider


mode: parallel
max: 10

variables:
  manual_scene_id: "manual_override_{{ this.entity_id | slugify }}"
  motion_entities: !input motion_sensors
  override_entity: !input override_boolean

trigger:
  # 1) Iemand (user) verandert brightness van een lamp -> override aan + scene snapshot
  - platform: state
    entity_id: !input lights
    id: manual_change

  # 2) Presence: minstens 1 motion sensor is ON en blijft dat min_motion_on lang
  - platform: template
    id: presence_stable
    value_template: >
      {{ (expand(motion_entities) | selectattr('state','eq','on') | list | count) > 0 }}
    for:
      seconds: !input min_motion_on

  # 3) Override werd aangezet (door deze automation of handmatig)
  - platform: state
    entity_id: !input override_boolean
    to: "on"
    id: override_enabled

condition: []

action:
  - choose:
      # ===== Handmatige brightness change detecteren =====
      - conditions:
          - condition: trigger
            id: manual_change
          # alleen als brightness écht veranderd is
          - condition: template
            value_template: >
              {% set f = trigger.from_state %}
              {% set t = trigger.to_state %}
              {% if f is none or t is none %} false
              {% else %}
                {{ (f.attributes.brightness | default(-1)) != (t.attributes.brightness | default(-1)) }}
              {% endif %}
          # alleen als het door een USER komt (niet door automation/script)
          - condition: template
            value_template: >
              {{ trigger.to_state.context.user_id is not none and trigger.to_state.context.parent_id is none }}
        sequence:
          - delay:
              seconds: !input scene_save_delay

          - service: input_boolean.turn_on
            target:
              entity_id: !input override_boolean

          - service: scene.create
            data:
              scene_id: "{{ manual_scene_id }}"
              snapshot_entities: !input lights

      # ===== Presence handling: als override aan, (optioneel) manual scene terugzetten =====
      # (Je kunt dit stuk uitbreiden als je wilt dat bij motion altijd manual scene wordt toegepast)
      - conditions:
          - condition: trigger
            id: presence_stable
          - condition: state
            entity_id: !input override_boolean
            state: "on"
        sequence:
          # Optioneel: als je wil dat bij presence de manual scene steeds terugkomt:
          # - service: scene.turn_on
          #   data:
          #     entity_id: "{{ 'scene.' ~ manual_scene_id }}"
          - delay: "00:00:00"

      # ===== Override timer-loop: reset alleen door presence_stable =====
      - conditions:
          - condition: trigger
            id: override_enabled
        sequence:
          - repeat:
              while:
                - condition: state
                  entity_id: !input override_boolean
                  state: "on"
              sequence:
                # Wacht op "presence_stable" (reset) OF timeout (geen stabiele presence)
                - wait_for_trigger:
                    - platform: template
                      value_template: >
                        {{ (expand(motion_entities) | selectattr('state','eq','on') | list | count) > 0 }}
                      for:
                        seconds: !input min_motion_on
                  timeout: !input no_motion_time
                  continue_on_timeout: true

                # Timeout => override uit + terug-actie
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ wait.trigger is none }}"
                      sequence:
                        - service: input_boolean.turn_off
                          target:
                            entity_id: !input override_boolean
                        - stop: "Override cleared after no stable presence"
    default: []
